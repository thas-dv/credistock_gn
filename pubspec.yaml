name: credistock_gn
description: Application de gestion de stock et dettes pour commerçants guinéens
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # === STATE MANAGEMENT ===
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # === LOCAL DATABASE ===
  drift: ^2.18.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # === CACHE ===
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # === BACKEND CLOUD ===
  supabase_flutter: ^2.5.3

  # === NOTIFICATIONS ===
  # FIX: firebase_core/messaging ne compilent pas sur Windows
  # → les appels Firebase sont wrappés dans kIsWeb/Platform.isAndroid guards
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # FIX: flutter_local_notifications v17+ introduit un plugin Windows natif
  # qui nécessite atlbase.h (workload ATL de Visual Studio C++ Desktop).
  # On reste sur v16 qui n'a PAS de plugin Windows natif → compile sans ATL.
  flutter_local_notifications: ^21.0.0

  # FIX: speech_to_text — le package Windows n'enregistre pas automatiquement
  # son registrar dans generated_plugin_registrant.cc sur certaines versions.
  # On reste sur ^6.6.2 et on corrige le registrant manuellement (voir fix ci-dessous).
  speech_to_text: ^7.3.0

  # === PARTAGE ===
  url_launcher: ^6.3.0
  share_plus: ^12.0.2

  # === UI ===
  go_router: ^17.2.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.2.0
  intl: ^0.20.2
  shimmer: ^3.0.0

  # === UTILS ===
  uuid: ^4.4.0
  connectivity_plus: ^7.1.0
  permission_handler: ^12.0.1
  local_auth: ^3.0.1
  crypto: ^3.0.3
  logger: ^2.4.0
  injectable: ^2.4.4
  get_it: ^9.2.1
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  injectable_generator: ^2.6.2
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

