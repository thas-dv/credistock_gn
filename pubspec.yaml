name: credistock
description: Gestion de stock et dettes pour commerçants - Offline First
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # === STATE MANAGEMENT ===
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # === LOCAL DATABASE (Offline-first) ===
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # === BACKEND CLOUD ===
  supabase_flutter: ^2.5.3

  # === NOTIFICATIONS FCM ===
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^16.3.3

  # === UI ===
  go_router: ^14.2.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # === UTILS ===
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  crypto: ^3.0.3
  logger: ^2.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  generate: true          # active les localisations .arb
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600